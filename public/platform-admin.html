<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIVA 運営者ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    background: #f4f6f8;
    color: #22303f;
  }
  header {
    background: #1f2d3d;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 18px; margin: 0; }
  #logoutBtn {
    background: transparent;
    border: 1px solid #ffffff66;
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
  main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
  .app-hidden { display: none !important; }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(20,25,32,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  .modal {
    background: #fff; border-radius: 10px; padding: 24px;
    width: 100%; max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .modal h2 { margin-top: 0; font-size: 16px; }
  .modal label { display: block; font-size: 13px; margin: 12px 0 4px; color: #4a5b6c; }
  .modal input, .modal textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #ccd4db; border-radius: 6px; font-size: 14px;
  }
  .modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px;
  }
  .btn-primary { background: #2c6ecb; color: #fff; }
  .btn-secondary { background: #e4e8ec; color: #22303f; }
  .btn-danger { background: #d0483b; color: #fff; }
  #loginError, #modalError { color: #d0483b; font-size: 13px; min-height: 18px; margin-top: 8px; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .toolbar h2 { font-size: 16px; margin: 0; }

  .clinic-card {
    background: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;
  }
  .clinic-name { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  .clinic-meta { font-size: 13px; color: #647585; line-height: 1.7; }
  .badge {
    display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 999px; margin-left: 8px;
  }
  .badge-active { background: #dff3e3; color: #1d8a3f; }
  .badge-trial { background: #fdf1d6; color: #a9720c; }
  .badge-suspended { background: #fbe0de; color: #b23324; }
  .counts { display: flex; gap: 14px; margin-top: 8px; font-size: 13px; color: #47586a; }
  .clinic-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .clinic-actions select { padding: 4px 8px; border-radius: 6px; border: 1px solid #ccd4db; }
  .cred-flag { font-size: 12px; }
  .cred-ok { color: #1d8a3f; }
  .cred-missing { color: #b23324; }
  #listError { color: #d0483b; font-size: 14px; }
</style>
</head>
<body>

<div id="loginOverlay" class="overlay">
  <div class="modal">
    <h2>CLIVA 運営者ダッシュボード</h2>
    <p style="font-size:13px;color:#647585;">運営者アカウントでログインしてください</p>
    <label>メールアドレス</label>
    <input id="loginEmail" type="email" autocomplete="username">
    <label>パスワード</label>
    <input id="loginPassword" type="password" autocomplete="current-password">
    <div id="loginError"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="loginBtn">ログイン</button>
    </div>
  </div>
</div>

<header>
  <h1>CLIVA 運営者ダッシュボード</h1>
  <button id="logoutBtn" class="app-hidden">ログアウト</button>
</header>

<main id="app" class="app-hidden">
  <div class="toolbar">
    <h2>医院一覧</h2>
    <button class="btn btn-primary" id="openCreateBtn">＋ 新規医院登録</button>
  </div>
  <div id="listError"></div>
  <div id="clinicList"></div>
</main>

<div id="createOverlay" class="overlay app-hidden">
  <div class="modal">
    <h2>新規医院登録</h2>
    <label>医院名（必須）</label>
    <input id="newClinicName" type="text" placeholder="例：さくら歯科クリニック">
    <label>LINEチャネルアクセストークン（あとから設定も可）</label>
    <textarea id="newLineToken" rows="2" placeholder="未定なら空欄でOK"></textarea>
    <label>LINEチャネルシークレット（あとから設定も可）</label>
    <input id="newLineSecret" type="text" placeholder="未定なら空欄でOK">
    <div id="modalError"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelCreateBtn">キャンセル</button>
      <button class="btn btn-primary" id="submitCreateBtn">登録する</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fxvbbcnrbrkzaxjlmoxe.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_SElqbRBcCrX8f9mfcQOxZA_gPDHtqbS';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const API_BASE = '/api/platform';

function showApp() {
  document.getElementById('loginOverlay').classList.add('app-hidden');
  document.getElementById('app').classList.remove('app-hidden');
  document.getElementById('logoutBtn').classList.remove('app-hidden');
  loadClinics();
}

function showLogin(message) {
  document.getElementById('loginOverlay').classList.remove('app-hidden');
  document.getElementById('app').classList.add('app-hidden');
  document.getElementById('logoutBtn').classList.add('app-hidden');
  document.getElementById('loginError').textContent = message || '';
}

async function apiFetch(url, options) {
  const { data: sessionData } = await sb.auth.getSession();
  const token = sessionData && sessionData.session ? sessionData.session.access_token : null;
  const opts = options || {};
  opts.headers = Object.assign({}, opts.headers, {
    'Authorization': 'Bearer ' + token,
    'Content-Type': 'application/json',
  });
  const res = await fetch(url, opts);
  if (res.status === 401 || res.status === 403) {
    const body = await res.json().catch(() => ({}));
    showLogin(body.error || 'ログインし直してください');
    throw new Error(body.error || '認証エラー');
  }
  return res;
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('loginError').textContent = 'ログインに失敗しました：' + error.message;
    return;
  }
  showApp();
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  showLogin();
});

function badgeClass(status) {
  if (status === 'active') return 'badge-active';
  if (status === 'suspended') return 'badge-suspended';
  return 'badge-trial';
}
function statusLabel(status) {
  if (status === 'active') return '稼働中';
  if (status === 'suspended') return '停止中';
  return 'トライアル';
}

async function loadClinics() {
  document.getElementById('listError').textContent = '';
  document.getElementById('clinicList').innerHTML = '読み込み中…';
  try {
    const res = await apiFetch(API_BASE + '/clinics');
    const body = await res.json();
    if (!res.ok) {
      document.getElementById('listError').textContent = body.error || '取得に失敗しました';
      document.getElementById('clinicList').innerHTML = '';
      return;
    }
    renderClinics(body.clinics || []);
  } catch (e) {
    document.getElementById('clinicList').innerHTML = '';
  }
}

function renderClinics(clinics) {
  const container = document.getElementById('clinicList');
  if (clinics.length === 0) {
    container.innerHTML = '<p style="color:#647585;">まだ医院が登録されていません。</p>';
    return;
  }
  container.innerHTML = '';
  clinics.forEach((c) => {
    const card = document.createElement('div');
    card.className = 'clinic-card';

    const counts = c.reservation_counts || { total: 0, reserved: 0, visited: 0, cancelled: 0 };
    const credText = c.has_line_credentials
      ? '<span class="cred-flag cred-ok">LINE連携：設定済み</span>'
      : '<span class="cred-flag cred-missing">LINE連携：未設定</span>';

    card.innerHTML = `
      <div>
        <p class="clinic-name">${escapeHtml(c.name)}<span class="badge ${badgeClass(c.status)}">${statusLabel(c.status)}</span></p>
        <div class="clinic-meta">
          webhook: /webhook/${escapeHtml(c.webhook_path)}<br>
          ${credText}
        </div>
        <div class="counts">
          <span>総予約数: ${counts.total}</span>
          <span>予約中: ${counts.reserved || 0}</span>
          <span>来院済み: ${counts.visited || 0}</span>
          <span>キャンセル: ${counts.cancelled || 0}</span>
        </div>
      </div>
      <div class="clinic-actions">
        <select data-clinic-id="${c.id}" class="statusSelect">
          <option value="trial" ${c.status === 'trial' ? 'selected' : ''}>トライアル</option>
          <option value="active" ${c.status === 'active' ? 'selected' : ''}>稼働中</option>
          <option value="suspended" ${c.status === 'suspended' ? 'selected' : ''}>停止中</option>
        </select>
      </div>
    `;
    container.appendChild(card);
  });

  container.querySelectorAll('.statusSelect').forEach((sel) => {
    sel.addEventListener('change', async (e) => {
      const clinicId = e.target.getAttribute('data-clinic-id');
      const status = e.target.value;
      try {
        const res = await apiFetch(API_BASE + '/clinics/' + clinicId + '/status', {
          method: 'PATCH',
          body: JSON.stringify({ status }),
        });
        const body = await res.json();
        if (!res.ok) {
          alert(body.error || '更新に失敗しました');
          loadClinics();
        }
      } catch (e) {
        // apiFetchが401/403でログイン画面に切り替え済み
      }
    });
  });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 新規医院登録モーダル
document.getElementById('openCreateBtn').addEventListener('click', () => {
  document.getElementById('newClinicName').value = '';
  document.getElementById('newLineToken').value = '';
  document.getElementById('newLineSecret').value = '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('createOverlay').classList.remove('app-hidden');
});
document.getElementById('cancelCreateBtn').addEventListener('click', () => {
  document.getElementById('createOverlay').classList.add('app-hidden');
});
document.getElementById('submitCreateBtn').addEventListener('click', async () => {
  const name = document.getElementById('newClinicName').value.trim();
  const lineToken = document.getElementById('newLineToken').value.trim();
  const lineSecret = document.getElementById('newLineSecret').value.trim();
  const errEl = document.getElementById('modalError');
  errEl.textContent = '';
  if (!name) {
    errEl.textContent = '医院名を入力してください';
    return;
  }
  try {
    const res = await apiFetch(API_BASE + '/clinics', {
      method: 'POST',
      body: JSON.stringify({
        name,
        line_channel_access_token: lineToken,
        line_channel_secret: lineSecret,
      }),
    });
    const body = await res.json();
    if (!res.ok) {
      errEl.textContent = body.error || '登録に失敗しました';
      return;
    }
    document.getElementById('createOverlay').classList.add('app-hidden');
    alert('登録しました。Webhook URL:\n' + body.webhook_url + '\n\nこのURLをLINE Developersコンソールの「Webhook URL」に設定してください。');
    loadClinics();
  } catch (e) {
    // apiFetchが401/403でログイン画面に切り替え済み
  }
});

// 初期表示：ログイン状態を確認
(async () => {
  const { data } = await sb.auth.getSession();
  if (data && data.session) {
    showApp();
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
